<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
</head>

<body>

<h1>Simple Calculator</h1>

<input type="number" id="num1" placeholder="First number" />

<select id="operation">
  <option value="sum">+</option>
  <option value="subtract">-</option>
  <option value="multiply">*</option>
  <option value="divide">/</option>
</select>

<input type="number" id="num2" placeholder="Second number" />

<button type="button" id="btnCalc">Calculate</button>

<p>Result: <strong id="result">—</strong></p>

<!-- compiled JS -->
<script src="sum.js"></script>

<script>

document.getElementById('btnCalc').addEventListener('click', function () {

  var a = Number(document.getElementById('num1').value) || 0;
  var b = Number(document.getElementById('num2').value) || 0;
  var op = document.getElementById('operation').value;

  try {

    var result;

    if (op === "sum") result = sum(a,b);
    if (op === "subtract") result = subtract(a,b);
    if (op === "multiply") result = multiply(a,b);
    if (op === "divide") result = divide(a,b);

    document.getElementById('result').textContent = result;

  } catch (error) {

    document.getElementById('result').textContent = error.message;

  }

});

</script>

</body>
</html>
